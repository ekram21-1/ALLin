<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris Infiel 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --pink-light: #fce4ec;
  --pink-mid: #f48fb1;
  --pink-deep: #d4537e;
  --pink-dark: #880e4f;
  --cream: #fff9fb;
  --gold: #f9c74f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Lato', sans-serif;
  background: radial-gradient(ellipse at top, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  width: 12px;
  height: 12px;
  background: var(--pink-deep);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: transform 0.1s;
  mix-blend-mode: multiply;
}
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 99998;
  border-radius: 50%;
  animation: sparkle-fade 0.8s ease-out forwards;
}
@keyframes sparkle-fade {
  0%   { opacity: 1; transform: scale(1) translate(0,0); }
  100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
}

/* ── PETALS ── */
.petal {
  position: fixed;
  top: -40px;
  pointer-events: none;
  z-index: 1;
  font-size: 18px;
  animation: petal-fall linear infinite;
  opacity: 0.75;
}
@keyframes petal-fall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.8; }
  50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); }
  100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; }
}

/* ── ALBUM SCENE ── */
.scene {
  perspective: 2000px;
  position: relative;
  z-index: 10;
}

.album-container {
  position: relative;
  width: 820px;
  height: 580px;
  max-width: 95vw;
  max-height: 88vh;
}

/* ── BOOK / COVER ── */
.book {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.cover {
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, #e91e8c 0%, #c2185b 40%, #880e4f 100%);
  border-radius: 4px 16px 16px 4px;
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1.000);
  cursor: pointer;
  box-shadow:
    -8px 0 20px rgba(0,0,0,0.3),
    0 20px 60px rgba(136,14,79,0.5),
    inset -3px 0 10px rgba(0,0,0,0.2);
  z-index: 20;
}
.cover.opened { transform: rotateY(-175deg); }

.cover-spine {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 24px;
  background: linear-gradient(90deg, #5d0034 0%, #880e4f 100%);
  border-radius: 4px 0 0 4px;
}

.cover-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 40px;
}

.cover-border {
  position: absolute;
  inset: 20px;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 10px;
}
.cover-border::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
}

.cover-corners span {
  position: absolute;
  width: 18px;
  height: 18px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.8;
}
.cover-corners span:nth-child(1) { top: 22px; left: 22px; border-width: 2px 0 0 2px; }
.cover-corners span:nth-child(2) { top: 22px; right: 22px; border-width: 2px 2px 0 0; }
.cover-corners span:nth-child(3) { bottom: 22px; left: 22px; border-width: 0 0 2px 2px; }
.cover-corners span:nth-child(4) { bottom: 22px; right: 22px; border-width: 0 2px 2px 0; }

.cover-title {
  font-family: 'Dancing Script', cursive;
  font-size: 5em;
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3), 0 0 40px rgba(249,199,79,0.3);
  line-height: 1;
}
.cover-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.4em;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.2em;
}
.cover-hearts {
  font-size: 1.6em;
  letter-spacing: 8px;
  margin-top: 4px;
}
.cover-hint {
  position: absolute;
  bottom: 28px;
  font-family: 'Lato', sans-serif;
  font-size: 0.75em;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* ── BOOK PAGES (base) ── */
.book-pages {
  position: absolute;
  inset: 0;
  background: #fff0f5;
  border-radius: 4px 16px 16px 4px;
  box-shadow: 0 10px 40px rgba(136,14,79,0.2);
}
.book-pages::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 6px;
  background: repeating-linear-gradient(
    to bottom,
    #f8c8d8 0px, #f8c8d8 2px,
    #fce4ec 2px, #fce4ec 6px
  );
  border-radius: 4px 0 0 4px;
}

/* ── PAGE FLIP ── */
.page-wrapper {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transform-origin: left center;
  transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1.000);
}
.page-wrapper.flipped { transform: rotateY(-175deg); }

.page-side {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 4px 16px 16px 4px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
}
.page-side.back {
  transform: rotateY(180deg);
  background: #fff5f8;
}

/* ── POLAROID ── */
.polaroid {
  background: white;
  padding: 18px 18px 54px 18px;
  box-shadow: 0 8px 32px rgba(136,14,79,0.18), 0 2px 8px rgba(0,0,0,0.08);
  width: 360px;
  max-width: 82%;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: default;
}
.polaroid:hover {
  transform: rotate(0deg) scale(1.04) !important;
  box-shadow: 0 16px 48px rgba(136,14,79,0.28);
  z-index: 5;
}

.polaroid-photo {
  width: 100%;
  aspect-ratio: 1;
  background: var(--pink-light);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.polaroid-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.polaroid-photo .photo-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--pink-deep);
  opacity: 0.4;
}
.polaroid-photo .photo-icon svg { width: 52px; height: 52px; }
.polaroid-photo .photo-icon span { font-size: 12px; letter-spacing: 0.1em; }

.polaroid-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
}
.polaroid-caption input {
  font-family: 'Dancing Script', cursive;
  font-size: 1.25em;
  color: #555;
  border: none;
  outline: none;
  background: transparent;
  text-align: center;
  width: 100%;
  cursor: text;
}
.polaroid-caption input::placeholder { color: #ccc; }

/* ── STICKERS ── */
.sticker-tray {
  position: absolute;
  right: -70px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: white;
  border: 1px solid #f4c0d1;
  border-radius: 20px;
  padding: 10px 8px;
  box-shadow: 0 4px 16px rgba(212,83,126,0.15);
  z-index: 100;
  display: none;
}
.sticker-tray.visible { display: flex; }
.sticker-btn {
  font-size: 1.5em;
  cursor: grab;
  transition: transform 0.2s;
  user-select: none;
  text-align: center;
  line-height: 1;
}
.sticker-btn:hover { transform: scale(1.3); }

.placed-sticker {
  position: absolute;
  font-size: 1.8em;
  cursor: grab;
  user-select: none;
  z-index: 50;
  transition: transform 0.15s;
  transform-origin: center;
}
.placed-sticker:hover { transform: scale(1.2); }
.placed-sticker.dragging { cursor: grabbing; opacity: 0.8; }

/* ── NAV BUTTONS ── */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 52px; height: 52px;
  background: white;
  border: 2px solid #f4c0d1;
  border-radius: 50%;
  color: var(--pink-deep);
  font-size: 1.3em;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(212,83,126,0.2);
  transition: all 0.25s;
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.nav-btn.visible { display: flex; }
.nav-btn:hover:not(:disabled) { background: var(--pink-deep); color: white; border-color: var(--pink-deep); transform: translateY(-50%) scale(1.1); }
.nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
#prevBtn { left: -70px; }
#nextBtn { right: -70px; }

/* ── PAGE COUNTER ── */
.page-counter {
  position: absolute;
  bottom: -44px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  border: 1px solid #f4c0d1;
  color: var(--pink-dark);
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 0.85em;
  letter-spacing: 0.1em;
  white-space: nowrap;
  box-shadow: 0 2px 10px rgba(212,83,126,0.15);
  display: none;
}
.page-counter.visible { display: block; }

/* ── CLOSE BUTTON ── */
.close-btn {
  position: absolute;
  top: -18px; right: -18px;
  width: 42px; height: 42px;
  background: var(--pink-deep);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 1.1em;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(212,83,126,0.4);
  transition: all 0.25s;
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
}
.close-btn.visible { display: flex; }
.close-btn:hover { background: var(--pink-dark); transform: scale(1.1) rotate(90deg); }

/* ── STICKER TOGGLE ── */
.sticker-toggle {
  position: absolute;
  top: -18px; left: -18px;
  width: 42px; height: 42px;
  background: white;
  border: 2px solid #f4c0d1;
  border-radius: 50%;
  font-size: 1.2em;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(212,83,126,0.2);
  transition: all 0.25s;
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
}
.sticker-toggle.visible { display: flex; }
.sticker-toggle:hover { transform: scale(1.1); background: var(--pink-light); }

/* ── MUSIC PLAYER ── */
.music-player {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  border: 1px solid #f4c0d1;
  border-radius: 40px;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 8px 30px rgba(212,83,126,0.2);
  z-index: 1000;
  min-width: 300px;
  max-width: 90vw;
}
.music-disc {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink-deep), var(--pink-dark));
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 1em;
  flex-shrink: 0;
  transition: transform 0.1s;
}
.music-disc.spinning { animation: spin 3s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.music-info { flex: 1; overflow: hidden; }
.music-title {
  font-family: 'Dancing Script', cursive;
  font-size: 1em;
  color: var(--pink-dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.music-artist {
  font-size: 0.7em;
  color: #aaa;
  letter-spacing: 0.05em;
}

.music-controls { display: flex; gap: 6px; align-items: center; }
.music-ctrl-btn {
  width: 30px; height: 30px;
  border: none;
  background: var(--pink-light);
  border-radius: 50%;
  color: var(--pink-deep);
  cursor: pointer;
  font-size: 0.85em;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.music-ctrl-btn:hover { background: var(--pink-deep); color: white; }
.music-ctrl-btn.play-btn {
  width: 36px; height: 36px;
  background: var(--pink-deep);
  color: white;
  font-size: 1em;
}
.music-ctrl-btn.play-btn:hover { background: var(--pink-dark); }

/* ── SHAKE TOAST ── */
.shake-toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: white;
  border: 1px solid #f4c0d1;
  border-radius: 30px;
  padding: 10px 24px;
  font-family: 'Dancing Script', cursive;
  font-size: 1.2em;
  color: var(--pink-dark);
  box-shadow: 0 8px 24px rgba(212,83,126,0.2);
  z-index: 9999;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.shake-toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .album-container { width: 92vw; height: 65vh; }
  #prevBtn { left: -44px; }
  #nextBtn { right: -44px; }
  .sticker-tray { right: -52px; }
  .polaroid { width: 74%; }
}
</style>
</head>
<body>

<div id="cursor"></div>

<!-- Petals injected by JS -->

<div class="shake-toast" id="shakeToast">🌸 Shuffled to a new memory!</div>

<div class="scene">
  <div class="album-container" id="albumContainer">

    <div class="book-pages"></div>

    <!-- Pages (rendered by JS) -->
    <div id="pagesArea"></div>

    <!-- Cover -->
    <div class="cover" id="cover" onclick="openAlbum()">
      <div class="cover-spine"></div>
      <div class="cover-face">
        <div class="cover-border"></div>
        <div class="cover-corners">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="cover-title">Paris Infiel</div>
        <div class="cover-sub">cutie pics</div>
        <div class="cover-hearts">♡ ♡ ♡</div>
        <div class="cover-hint">click to open</div>
      </div>
    </div>

    <!-- Controls -->
    <button class="close-btn" id="closeBtn" onclick="closeAlbum()">✕</button>
    <button class="sticker-toggle" id="stickerToggle" onclick="toggleStickerTray()">🌸</button>
    <button class="nav-btn" id="prevBtn" onclick="prevPage()">◀</button>
    <button class="nav-btn" id="nextBtn" onclick="nextPage()">▶</button>
    <div class="page-counter" id="pageCounter">1 / 6</div>

    <!-- Sticker Tray -->
    <div class="sticker-tray" id="stickerTray">
      <div class="sticker-btn" onclick="placeSticker('🌸')">🌸</div>
      <div class="sticker-btn" onclick="placeSticker('💕')">💕</div>
      <div class="sticker-btn" onclick="placeSticker('⭐')">⭐</div>
      <div class="sticker-btn" onclick="placeSticker('🎀')">🎀</div>
      <div class="sticker-btn" onclick="placeSticker('✨')">✨</div>
      <div class="sticker-btn" onclick="placeSticker('🌷')">🌷</div>
      <div class="sticker-btn" onclick="placeSticker('💋')">💋</div>
    </div>

  </div>
</div>

<!-- Music Player -->
<div class="music-player" id="musicPlayer">
  <div class="music-disc" id="musicDisc">♪</div>
  <div class="music-info">
    <div class="music-title" id="musicTitle">No music loaded</div>
    <div class="music-artist" id="musicArtist">add songs below ↓</div>
  </div>
  <div class="music-controls">
    <button class="music-ctrl-btn" onclick="prevSong()" title="Previous">⏮</button>
    <button class="music-ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="music-ctrl-btn" onclick="nextSong()" title="Next">⏭</button>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
/* ══════════════════════════════
   CONFIG — edit these!
══════════════════════════════ */
const photos = [
  { src: 'photo1.jpg', caption: 'memory one 🌸' },
  { src: 'photo2.jpg', caption: 'memory two 💕' },
  { src: 'photo3.jpg', caption: 'memory three ✨' },
  { src: 'photo4.jpg', caption: 'memory four 🎀' },
  { src: 'photo5.jpg', caption: 'memory five 🌷' },
  { src: 'photo6.jpg', caption: 'memory six 💋' },
];

// Add your songs here: { src: 'filename.mp3', title: 'Song Name', artist: 'Artist' }
const songs = [
  { src: 'music1.mp3', title: 'Glue Song',   artist: 'Beebadoobee' },
  { src: 'music2.mp3', title: 'Melting',   artist: 'Kali Uchis' },
  { src: 'music3.mp3', title: 'Those Eyes', artist: 'New West' },
];

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let currentPage = 0;
let isOpen = false;
let songIndex = 0;
let isPlaying = false;
const totalPages = photos.length;

/* ══════════════════════════════
   PETALS
══════════════════════════════ */
const petalEmojis = ['🌸', '🌷', '🌺', '💮'];
for (let i = 0; i < 14; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
  p.style.cssText = `
    left: ${Math.random() * 100}%;
    font-size: ${12 + Math.random() * 14}px;
    animation-duration: ${6 + Math.random() * 8}s;
    animation-delay: ${-Math.random() * 10}s;
    opacity: ${0.5 + Math.random() * 0.4};
  `;
  document.body.appendChild(p);
}

/* ══════════════════════════════
   SPARKLE CURSOR
══════════════════════════════ */
const cursor = document.getElementById('cursor');
const colors = ['#f48fb1','#f9c74f','#d4537e','#ffffff','#fce4ec'];
let lastSparkle = 0;

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  const now = Date.now();
  if (now - lastSparkle < 40) return;
  lastSparkle = now;
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 4 + Math.random() * 7;
    const tx = (Math.random() - 0.5) * 60 + 'px';
    const ty = (Math.random() - 0.5) * 60 + 'px';
    s.style.cssText = `
      left: ${e.clientX}px; top: ${e.clientY}px;
      width: ${size}px; height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --tx: ${tx}; --ty: ${ty};
      animation-duration: ${0.5 + Math.random() * 0.4}s;
      animation-delay: ${i * 0.05}s;
      transform: translate(-50%, -50%);
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
});

/* ══════════════════════════════
   BUILD PAGES
══════════════════════════════ */
const pagesArea = document.getElementById('pagesArea');

function buildPages() {
  pagesArea.innerHTML = '';
  photos.forEach((photo, i) => {
    const tilt = (Math.random() - 0.5) * 5;
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.id = `page-${i}`;
    wrapper.style.zIndex = totalPages - i;

    wrapper.innerHTML = `
      <div class="page-side front">
        <div class="polaroid" style="transform: rotate(${tilt}deg)">
          <div class="polaroid-photo" id="photo-box-${i}">
            <div class="photo-icon">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="10" width="56" height="44" rx="4" stroke="currentColor" stroke-width="2.5"/>
                <circle cx="22" cy="26" r="6" stroke="currentColor" stroke-width="2.5"/>
                <path d="M4 42l14-12 10 10 10-14 22 18" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
              </svg>
              <span>photo ${i + 1}</span>
            </div>
          </div>
          <div class="polaroid-caption">
            <input type="text" value="${photo.caption}" placeholder="write something..." />
          </div>
        </div>
      </div>
      <div class="page-side back">
        <div class="polaroid" style="transform: rotate(${-tilt}deg)">
          <div class="polaroid-photo" id="photo-box-back-${i}">
            <div class="photo-icon">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="10" width="56" height="44" rx="4" stroke="currentColor" stroke-width="2.5"/>
                <circle cx="22" cy="26" r="6" stroke="currentColor" stroke-width="2.5"/>
                <path d="M4 42l14-12 10 10 10-14 22 18" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <div class="polaroid-caption">
            <input type="text" placeholder="write something..." />
          </div>
        </div>
      </div>
    `;
    pagesArea.appendChild(wrapper);

    // Try loading image
    const img = new Image();
    img.onload = () => {
      ['photo-box-' + i, 'photo-box-back-' + i].forEach(id => {
        const box = document.getElementById(id);
        if (box) box.innerHTML = `<img src="${photo.src}" alt="photo ${i+1}">`;
      });
    };
    img.src = photo.src;
  });
}

buildPages();

/* ══════════════════════════════
   OPEN / CLOSE
══════════════════════════════ */
function openAlbum() {
  if (isOpen) return;
  isOpen = true;
  document.getElementById('cover').classList.add('opened');
  currentPage = 0;
  showPage(0);
  ['closeBtn','stickerToggle','prevBtn','nextBtn','pageCounter'].forEach(id => {
    document.getElementById(id).classList.add('visible');
  });
}

function closeAlbum() {
  isOpen = false;
  document.getElementById('cover').classList.remove('opened');
  for (let i = 0; i < totalPages; i++) {
    const p = document.getElementById(`page-${i}`);
    if (p) p.classList.remove('flipped');
  }
  ['closeBtn','stickerToggle','prevBtn','nextBtn','pageCounter'].forEach(id => {
    document.getElementById(id).classList.remove('visible');
  });
  document.getElementById('stickerTray').classList.remove('visible');
}

function showPage(index) {
  currentPage = Math.max(0, Math.min(totalPages - 1, index));
  for (let i = 0; i < totalPages; i++) {
    const p = document.getElementById(`page-${i}`);
    if (!p) continue;
    if (i < currentPage) p.classList.add('flipped');
    else p.classList.remove('flipped');
    p.style.zIndex = i < currentPage ? i : totalPages - i;
  }
  document.getElementById('pageCounter').textContent = `${currentPage + 1} / ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === totalPages - 1;
}

function nextPage() { if (currentPage < totalPages - 1) showPage(currentPage + 1); }
function prevPage() { if (currentPage > 0) showPage(currentPage - 1); }

/* ══════════════════════════════
   STICKERS
══════════════════════════════ */
function toggleStickerTray() {
  document.getElementById('stickerTray').classList.toggle('visible');
}

function placeSticker(emoji) {
  const container = document.getElementById('albumContainer');
  const rect = container.getBoundingClientRect();
  const s = document.createElement('div');
  s.className = 'placed-sticker';
  s.textContent = emoji;
  s.style.left = (40 + Math.random() * 60) + '%';
  s.style.top  = (20 + Math.random() * 60) + '%';
  makeDraggable(s);
  container.appendChild(s);
  s.animate([
    { transform: 'scale(0) rotate(-30deg)', opacity: 0 },
    { transform: 'scale(1.3) rotate(5deg)', opacity: 1, offset: 0.7 },
    { transform: 'scale(1) rotate(0deg)', opacity: 1 }
  ], { duration: 350, easing: 'ease-out', fill: 'forwards' });
}

function makeDraggable(el) {
  let ox, oy, startX, startY;
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    el.classList.add('dragging');
    const rect = el.parentElement.getBoundingClientRect();
    startX = parseFloat(el.style.left);
    startY = parseFloat(el.style.top);
    ox = e.clientX;
    oy = e.clientY;
    const move = ev => {
      const dx = ((ev.clientX - ox) / rect.width) * 100;
      const dy = ((ev.clientY - oy) / rect.height) * 100;
      el.style.left = (startX + dx) + '%';
      el.style.top  = (startY + dy) + '%';
    };
    const up = () => {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  // double-click to remove
  el.addEventListener('dblclick', () => el.remove());
}

/* ══════════════════════════════
   MUSIC
══════════════════════════════ */
const audio = document.getElementById('audioPlayer');

function loadSong(index, autoplay = false) {
  if (!songs.length) return;
  songIndex = ((index % songs.length) + songs.length) % songs.length;
  const song = songs[songIndex];
  audio.src = song.src;
  document.getElementById('musicTitle').textContent = song.title;
  document.getElementById('musicArtist').textContent = song.artist;
  if (autoplay || isPlaying) { audio.play(); setPlaying(true); }
}

function setPlaying(val) {
  isPlaying = val;
  document.getElementById('playBtn').textContent = val ? '⏸' : '▶';
  document.getElementById('musicDisc').classList.toggle('spinning', val);
}

function togglePlay() {
  if (!audio.src || audio.src === window.location.href) { loadSong(0, true); return; }
  if (isPlaying) { audio.pause(); setPlaying(false); }
  else { audio.play(); setPlaying(true); }
}

function nextSong() { loadSong(songIndex + 1, isPlaying); }
function prevSong() { loadSong(songIndex - 1, isPlaying); }

audio.addEventListener('ended', () => nextSong());

if (songs.length) {
  loadSong(0);
  document.getElementById('musicTitle').textContent = songs[0].title;
  document.getElementById('musicArtist').textContent = songs[0].artist;
}

/* ══════════════════════════════
   SHAKE TO SHUFFLE
══════════════════════════════ */
let lastX, lastY, lastZ, lastTime = 0;
const SHAKE_THRESHOLD = 15;

if (window.DeviceMotionEvent) {
  window.addEventListener('devicemotion', e => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    const now = Date.now();
    if (now - lastTime < 500) return;
    if (lastX === undefined) { lastX = acc.x; lastY = acc.y; lastZ = acc.z; return; }
    const delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
    if (delta > SHAKE_THRESHOLD && isOpen) {
      lastTime = now;
      const randPage = Math.floor(Math.random() * totalPages);
      showPage(randPage);
      showShakeToast();
    }
    lastX = acc.x; lastY = acc.y; lastZ = acc.z;
  });
}

// Desktop shake simulation: double-tap 'S'
let sKeyCount = 0, sKeyTimer;
document.addEventListener('keydown', e => {
  if (!isOpen) {
    if (e.key === 'Enter') openAlbum();
    return;
  }
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft')  prevPage();
  if (e.key === 'Escape') closeAlbum();
  if (e.key === 's' || e.key === 'S') {
    sKeyCount++;
    clearTimeout(sKeyTimer);
    sKeyTimer = setTimeout(() => sKeyCount = 0, 400);
    if (sKeyCount >= 2) {
      sKeyCount = 0;
      showPage(Math.floor(Math.random() * totalPages));
      showShakeToast();
    }
  }
});

function showShakeToast() {
  const toast = document.getElementById('shakeToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>
